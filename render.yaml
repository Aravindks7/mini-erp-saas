# Render Blueprint Specification
#
# This file allows one-click deployment of the entire stack on Render.
# It defines a managed PostgreSQL database and two Web Services (Server and Client).

services:
  # 1. API Server (Node.js Docker)
  - type: web
    name: erp-saas-api
    env: docker
    dockerContext: server
    dockerfilePath: server/Dockerfile
    plan: free # Change to 'starter' or higher for production use
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-saas-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false # Set this in Render dashboard to your API URL after service creation
      - key: PORT
        value: 3000

  # 2. Frontend Client (Nginx Docker)
  - type: web
    name: erp-saas-client
    env: docker
    dockerContext: client
    dockerfilePath: client/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://erp-saas-api.onrender.com

databases:
  # Managed PostgreSQL
  - name: erp-saas-db
    plan: free # Free tier expires after 90 days on Render
    databaseName: erp_saas
    user: erp_admin
