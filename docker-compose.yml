services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["npm", "run", "db:migrate"]
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy

  erp-saas-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      erp-saas-api:
        condition: service_healthy

volumes:
  postgres_data:
